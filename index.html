<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Repo</title>
  <script>
    // Recovers the real path after GitHub Pages' 404.html SPA-redirect
    // trick (see 404.html and docs/fragile-solutions.md) and computes
    // SITE_ROOT — this deployment's base path ('/' locally, '/ReviewRepo/'
    // on GitHub Pages). Runs before anything else loads, since every
    // relative asset/link below has to be built from SITE_ROOT rather than
    // a plain relative path: once the visible URL is .../review/<id>, a
    // bare relative path like "shared.js" would resolve against
    // ".../review/" instead of the real root.
    (function () {
      function computeRoot(path) {
        var m = /^(.*?\/)review\/[^/]+\/?$/.exec(path);
        return m ? m[1] : path.replace(/[^/]*$/, '');
      }
      window.SITE_ROOT = computeRoot(location.pathname);

      var params = new URLSearchParams(location.search);
      var redirected = params.get('p');
      if (redirected) {
        params.delete('p');
        var qs = params.toString();
        var newPath = window.SITE_ROOT.slice(0, -1) + redirected;
        history.replaceState(null, '', newPath + (qs ? '?' + qs : '') + location.hash);
      }
    })();

    const _v = Date.now();
    const _l = document.createElement('link');
    _l.rel = 'stylesheet'; _l.href = SITE_ROOT + 'style.css?v=' + _v;
    document.head.appendChild(_l);
  </script>
</head>
<body>
  <header>
    <a href="." id="site-title">
      <svg id="site-logo" viewBox="0 0 32 32" width="20" height="20" aria-hidden="true">
        <text x="7" y="10" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="22" fill="currentColor">R</text>
        <text x="24" y="22" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="22" fill="currentColor">R</text>
      </svg>
      Review Repo
    </a>
    <a href="admin/" id="admin-link" aria-label="Admin" title="Admin">⚙</a>
  </header>
  <div id="title-search-bar">
    <input type="text" id="title-search" placeholder="Search by game name..." autocomplete="off">
  </div>
  <div id="recommend-filter-row">
    <div id="sort-controls">
      <span class="tag-group-label">Sort By</span>
      <button class="tag-filter" id="playtime-sort-btn">Playtime</button>
      <button class="tag-filter" id="price-sort-btn">Price</button>
      <div id="date-filter-group">
        <button type="button" class="tag-filter" id="date-sort-btn">Release Date</button>
        <button type="button" id="date-field-swap" aria-label="Switch between release date and review date" title="Switch between release date and review date">&#8596;</button>
      </div>
      <select id="date-range-year" aria-label="Filter to a year (select blank to clear)">
        <option value="">Year</option>
      </select>
    </div>
    <button class="tag-filter" id="recommend-filter-btn">Recommended</button>
    <button type="button" class="tag-filter" id="tag-filters-toggle" aria-label="Toggle tag filters" title="Show/hide tag filters">Tags &#9881;</button>
    <button type="button" class="tag-filter" id="clear-all-btn" title="Reset every filter and sort in this row">Clear</button>
  </div>
  <div id="tag-filters" class="collapsed"></div>
  <main id="app"></main>
  <script>
    // Static hrefs above are a plain-relative fallback (correct only when
    // the visible URL is exactly SITE_ROOT); these overrides make them
    // correct from a .../review/<id> URL too.
    document.getElementById('site-title').href = SITE_ROOT;
    document.getElementById('admin-link').href = SITE_ROOT + 'admin/';

    const _sh = document.createElement('script');
    _sh.src = SITE_ROOT + 'shared.js?v=' + _v;
    _sh.async = false;
    document.body.appendChild(_sh);

    const _s = document.createElement('script');
    _s.src = SITE_ROOT + 'app.js?v=' + _v;
    _s.async = false;
    document.body.appendChild(_s);
  </script>
</body>
</html>
